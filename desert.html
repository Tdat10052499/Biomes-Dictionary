<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        (function() {
            // Adaptive Device/Width Routing
            const isMobileDevice = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isSmallScreen = window.innerWidth <= 768;
            
            if (isMobileDevice || isSmallScreen) {
                window.location.replace("desert-mobile.html");
            } else {
                window.location.replace("desert-desktop.html");
            }
        })();
    </script>
</head>
<body>
    <p>If you are not redirected automatically, please select: 
        <a href="desert-mobile.html">Mobile Version</a> or 
        <a href="desert-desktop.html">Desktop Version</a>.
    </p>
</body>
</html>
